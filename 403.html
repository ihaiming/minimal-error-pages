<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - 禁止访问</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --button-hover: #1a1a1a;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            padding: 1rem;
        }
        .container {
            text-align: center;
            max-width: 100%;
        }
        .error-code {
            font-size: clamp(7rem, 18vw, 12rem);
            font-weight: 200;
            letter-spacing: -0.03em;
            line-height: 1;
            color: #1a1a1a;
            user-select: none;
        }
        .divider {
            width: 40px;
            height: 1px;
            background-color: #d0d0d0;
            margin: 1.5rem auto;
            transition: width 0.4s ease;
        }
        .container:hover .divider {
            width: 60px;
        }
        .title {
            font-size: 1.15rem;
            font-weight: 400;
            color: #555;
            letter-spacing: 0.04em;
            margin-bottom: 0.6rem;
        }
        .description {
            font-size: 0.9rem;
            color: #999;
            font-weight: 300;
            letter-spacing: 0.03em;
            line-height: 1.7;
            max-width: 320px;
            margin: 0 auto 2.2rem auto;
            padding: 0 1rem;
        }
        .btn-back {
            display: inline-block;
            padding: 0.7rem 2rem;
            font-size: 0.85rem;
            letter-spacing: 0.06em;
            color: #555;
            text-decoration: none;
            border: 1px solid #ddd;
            border-radius: 50px;
            background: transparent;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            font-weight: 400;
            position: relative;
            overflow: hidden;
            white-space: nowrap;
        }
        .btn-back::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--button-hover);
            border-radius: 50px;
            transform: scale(0);
            transition: transform 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            z-index: -1;
        }
        .btn-back:hover {
            color: #fff;
            border-color: var(--button-hover);
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transform: translateY(-1px);
        }
        .btn-back:hover::before {
            transform: scale(1);
        }
        .btn-back:active {
            transform: scale(0.97);
            transition: transform 0.1s ease;
        }
        .dot-decoration {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 3rem;
            opacity: 0.5;
            flex-wrap: wrap;
        }
        .dot-decoration span {
            width: 4px;
            height: 4px;
            background: #ccc;
            border-radius: 50%;
            animation: pulse 2.4s ease-in-out infinite;
        }
        .dot-decoration span:nth-child(2) { animation-delay: 0.3s; }
        .dot-decoration span:nth-child(3) { animation-delay: 0.6s; }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.4); }
        }
        @media (max-width: 480px) {
            body { padding: 1rem 0.8rem; }
            .error-code { font-size: clamp(5.5rem, 25vw, 8rem); }
            .title { font-size: 1rem; }
            .description { font-size: 0.8rem; max-width: 260px; margin-bottom: 1.8rem; }
            .btn-back { padding: 0.65rem 1.7rem; font-size: 0.8rem; }
            .divider { margin: 1.2rem auto; }
            .dot-decoration { margin-top: 2rem; gap: 6px; }
        }
        @media (max-width: 360px) {
            .error-code { font-size: clamp(4.8rem, 22vw, 6.5rem); }
            .description { font-size: 0.78rem; max-width: 220px; }
            .btn-back { padding: 0.6rem 1.5rem; font-size: 0.78rem; }
            .dot-decoration { margin-top: 1.6rem; }
        }
        @media (min-width: 768px) {
            .error-code { font-size: clamp(9rem, 16vw, 14rem); }
            .title { font-size: 1.25rem; }
            .description { font-size: 0.95rem; max-width: 360px; }
            .btn-back { padding: 0.75rem 2.2rem; font-size: 0.9rem; }
        }
        @media (min-width: 1200px) {
            .error-code { font-size: 13rem; }
        }
        @media (hover: none) {
            .btn-back:hover { color: #555; border-color: #ddd; box-shadow: none; transform: none; }
            .btn-back:hover::before { transform: scale(0); }
            .container:hover .divider { width: 40px; }
        }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #fafafa; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">403</div>
        <div class="divider"></div>
        <p class="title">禁止访问</p>
        <p class="description">
            您没有权限查看此页面或资源<br>如有疑问请联系网站管理员
        </p>
        <a href="/" class="btn-back">返回首页</a>
        <div class="dot-decoration">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
</body>
</html>
